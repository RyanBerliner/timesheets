<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="manifest" href="manifest.json">
    <title>Timesheets</title>
    <style>
      .accordion-item {
        border-left: 0;
        border-right: 0;
        border-radius: 0 !important;
      }

      .accordion-button {
        border-radius: 0 !important;
      }
    </style>
  </head>
  <body class="mx-auto" style="max-width: 600px;">
    <div class="alert alert-secondary alert-dismissible fade show rounded-0 border-0 d-none" role="alert" id="sw-update-alert">
      <a href="#" role="button" id="sw-skip-waiting" class="alert-link">Update now</a> to get the latest version.
      <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <script src="js/updater.js" defer></script>

    <div id="app"></div>
    <p class="container">
      <a href="https://github.com/RyanBerliner/timesheets/blob/master/README.md" target="_blank">
        What is this and how do I use it?
      </a><br/>
      <small class="text-muted d-block">Version 2026.03.29.0</small>
    </p>

    <script src="https://unpkg.com/react@17.0.2/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@17.0.2/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/bs5-react-elements@2.1.1/dist/bs5-react-elements.min.js" crossorigin></script>
    <script src="js/app.js" type="module"></script>
  </body>
</html>
